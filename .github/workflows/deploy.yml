name: Deploy nginx

on:
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Create S3 state bucket
        run: aws s3 mb s3://${{ secrets.TF_STATE_BUCKET }} --region ${{ secrets.AWS_REGION }} 2>/dev/null || true

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
        working-directory: terraform

      - name: Terraform Apply
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}"
        working-directory: terraform

  build-and-push:
    runs-on: ubuntu-latest
    needs: terraform
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: build
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ secrets.PROJECT_NAME }}:${{ github.sha }}"
          IMAGE_LATEST="${{ steps.login-ecr.outputs.registry }}/${{ secrets.PROJECT_NAME }}:latest"
          docker build -t $IMAGE .
          docker tag $IMAGE $IMAGE_LATEST
          docker push $IMAGE
          docker push $IMAGE_LATEST
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

  deploy-ecs:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.PROJECT_NAME }}-cluster \
            --service ${{ secrets.PROJECT_NAME }}-service \
            --force-new-deployment

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ secrets.PROJECT_NAME }}-cluster \
            --services ${{ secrets.PROJECT_NAME }}-service

  verify:
    runs-on: ubuntu-latest
    needs: deploy-ecs
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ALB URL
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ secrets.PROJECT_NAME }}-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text 2>/dev/null || \
          aws elbv2 describe-load-balancers \
            --names "$(echo '${{ secrets.PROJECT_NAME }}' | tr '_' '-')-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://$ALB_DNS/ || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed with HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s"
            sleep 10
          done
          echo "Health check failed after all retries"
          exit 1

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-ecs, verify]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Print live URL
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ secrets.PROJECT_NAME }}-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text 2>/dev/null || \
          aws elbv2 describe-load-balancers \
            --names "$(echo '${{ secrets.PROJECT_NAME }}' | tr '_' '-')-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "=========================================="
          echo "  nginx is live!"
          echo "  URL: http://$ALB_DNS/"
          echo "  Project: ${{ secrets.PROJECT_NAME }}"
          echo "  Region: ${{ secrets.AWS_REGION }}"
          echo "=========================================="
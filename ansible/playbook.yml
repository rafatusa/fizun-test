---
- name: Deploy nginx in Docker on EC2
  hosts: all
  become: yes
  vars:
    app_name: nginx
    ansible_user: ubuntu

  tasks:
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repo
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu jammy stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset SSH connection so group change takes effect
      meta: reset_connection

    - name: Wipe old app files to prevent stale file serving
      file:
        path: /opt/app
        state: absent
      ignore_errors: yes

    - name: Recreate app directory
      file:
        path: /opt/app
        state: directory
        mode: '0755'

    - name: Copy app files (full repo sync)
      copy:
        src: ../
        dest: /opt/app/
        mode: '0755'

    - name: Stop existing container
      shell: docker stop app || true

    - name: Remove existing container
      shell: docker rm app || true

    - name: Remove old image to force rebuild
      shell: docker rmi app:latest || true

    - name: Build image
      shell: docker build --no-cache -t app:latest /opt/app/

    - name: Run container
      shell: docker run -d --name app -p 80:80 --restart always app:latest

    - name: Wait for container to be ready
      pause:
        seconds: 5

    - name: Verify container is running
      shell: "docker ps --filter name=app --filter status=running --format '{{ '{{' }}.Names{{ '}}' }}'"
      register: result
      retries: 3
      delay: 5
      until: result.stdout != ""
      become: yes